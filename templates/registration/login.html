<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Ellenco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f4f6f9; }</style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4 border-0" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="text-primary fw-bold">Ellenco Avaliações</h3>
            <p class="text-muted small">Faça login para continuar</p>
        </div>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger py-2 small text-center">Usuário ou senha incorretos.</div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label fw-bold text-secondary small">Usuário</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary small">Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">Entrar no Sistema</button>
        </form>
    </div>

</body>
</html>
